# Podman compatible: `podman compose --env-file .env up -d` (or Docker Compose).
# The bundled Keycloak command uses `start-dev` for labs only; production should
# override the command with hardened `start` plus TLS/proxy settings.
services:
  app:
    build: .
    ports:
      - "${FREEITSM_HTTP_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_SERVER=db
      - DB_NAME=${DB_NAME:-freeitsm}
      - DB_USERNAME=${DB_USERNAME:-freeitsm}
      - DB_PASSWORD=${DB_PASSWORD:-freeitsm}
      - FREEITSM_BASE_URL=${FREEITSM_BASE_URL:-http://localhost:8080}
      - ENCRYPTION_KEY_PATH=/var/www/encryption_keys/freeitsm.key
      - DEFAULT_IMAP_HOST=${DEFAULT_IMAP_HOST:-}
      - DEFAULT_IMAP_PORT=${DEFAULT_IMAP_PORT:-993}
      - DEFAULT_IMAP_ENCRYPTION=${DEFAULT_IMAP_ENCRYPTION:-ssl}
      - DEFAULT_SMTP_HOST=${DEFAULT_SMTP_HOST:-}
      - DEFAULT_SMTP_PORT=${DEFAULT_SMTP_PORT:-587}
      - DEFAULT_SMTP_ENCRYPTION=${DEFAULT_SMTP_ENCRYPTION:-tls}
    volumes:
      - attachments:/var/www/html/tickets/attachments
      - cm-attachments:/var/www/html/change-management/attachments
      - encryption-keys:/var/www/encryption_keys

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-freeitsm}
      MYSQL_USER: ${DB_USERNAME:-freeitsm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-freeitsm}
    ports:
      - "${DB_HOST_PORT:-3307}:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./database/freeitsm.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak-db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_password}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USERNAME:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: ["start-dev"] # Lab only. Production: use hardened `start`.
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin_dev_password}
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_dev_password}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_HTTP_PORT:-8081}:8080"

volumes:
  db-data:
  attachments:
  cm-attachments:
  encryption-keys:
  keycloak-db-data:
